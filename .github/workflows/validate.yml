name: Validate workers

on:
  push:
    branches: ['**']
    paths:
      - 'workers/**'
      - 'schema.json'
      - 'scripts/validate.js'
      - 'package.json'
      - 'package-lock.json'
  pull_request:
    paths:
      - 'workers/**'
      - 'schema.json'
      - 'scripts/validate.js'
      - 'package.json'
      - 'package-lock.json'

jobs:
  validate:
    name: Validate all worker files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate worker manifests
        run: npm run validate
